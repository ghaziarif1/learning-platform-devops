upstream user_service {
    server user-service:8002;
}

upstream course_service {
    server course-service:8001;
}

upstream analytics_service {
    server analytics-service:8003;
}

upstream ai_tutor_service {
    server ai-tutor-service:8004;
}

upstream feedback_service {
    server feedback-service:8005;
}

server {
    listen 80;
    server_name localhost;

    # ── Health global ──────────────────────────────
    location /health {
        return 200 '{"status":"OK","gateway":"nginx"}';
        add_header Content-Type application/json;
    }

    # ── User Service ───────────────────────────────
    location /api/auth/ {
        proxy_pass         http://user_service/auth/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/users/ {
        proxy_pass         http://user_service/users/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Course Service ─────────────────────────────
    location /api/courses/ {
        proxy_pass         http://course_service/courses/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/enrollments/ {
        proxy_pass         http://course_service/enrollments/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Analytics Service ──────────────────────────
    location /api/events/ {
        proxy_pass         http://analytics_service/events/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/dashboard/ {
        proxy_pass         http://analytics_service/dashboard/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── AI Tutor Service ───────────────────────────
    location /api/chat/ {
        proxy_pass         http://ai_tutor_service/chat/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /api/quiz/ {
        proxy_pass         http://ai_tutor_service/quiz/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /api/recommendations/ {
        proxy_pass         http://ai_tutor_service/recommendations/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # ── Feedback Service ───────────────────────────
    location /api/feedback/ {
        proxy_pass         http://feedback_service/feedback/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Frontend (Next.js) ─────────────────────────
    location / {
        proxy_pass         http://learning-portal:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }
}