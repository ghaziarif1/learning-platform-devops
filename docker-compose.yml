version: "3.8"

services:
  # ==================== BASES DE DONNÉES ====================

  postgres:
    image: postgres:16-alpine
    container_name: lp_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - learning_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: lp_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./infrastructure/mongodb/init:/docker-entrypoint-initdb.d
    networks:
      - learning_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lp_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - learning_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: lp_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - learning_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ==================== OLLAMA ====================

  ollama:
    image: ollama/ollama:latest
    container_name: lp_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - learning_network
    restart: unless-stopped

  # ==================== MICROSERVICES ====================

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: lp_user_service
    environment:
      PORT: 8002
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/${MONGO_DB}?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV: production
    ports:
      - "8002:8002"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - learning_network
    restart: unless-stopped

  course-service:
    build:
      context: ./services/course-service
      dockerfile: Dockerfile
    container_name: lp_course_service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/courses_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      USER_SERVICE_URL: http://user-service:8002
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - learning_network
    restart: unless-stopped

  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    container_name: lp_analytics_service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/analytics_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      COURSE_SERVICE_URL: http://course-service:8001
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - learning_network
    restart: unless-stopped

  ai-tutor-service:
    build:
      context: ./services/ai-tutor-service
      dockerfile: Dockerfile
    container_name: lp_ai_tutor
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: tinyllama
      COURSE_SERVICE_URL: http://course-service:8001
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - "8004:8004"
    depends_on:
      - ollama
      - course-service
      - redis
    networks:
      - learning_network
    restart: unless-stopped

  # ==================== FEEDBACK SERVICE ====================

  feedback-service:
    build:
      context: ./services/n8n-automation/feedback-api
      dockerfile: Dockerfile
    container_name: lp_feedback_service
    environment:
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/${MONGO_DB}?authSource=admin
      N8N_WEBHOOK_URL: http://n8n:5678/webhook/feedback
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: tinyllama
    ports:
      - "8005:8005"
    depends_on:
      mongodb:
        condition: service_healthy
      n8n:
        condition: service_started
    networks:
      - learning_network
    restart: unless-stopped

  # ==================== N8N ====================

  n8n:
    image: n8nio/n8n:latest
    container_name: lp_n8n
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_HOST: n8n
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://n8n:5678/
      GENERIC_TIMEZONE: Africa/Tunis
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - learning_network
    restart: unless-stopped

  # ==================== FRONTEND ====================

  learning-portal:
    build:
      context: ./frontend/learning-portal
      dockerfile: Dockerfile
    container_name: lp_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost
    ports:
      - "3000:3000"
    depends_on:
      - nginx-gateway
    networks:
      - learning_network
    restart: unless-stopped

  # ==================== NGINX GATEWAY ====================

  nginx-gateway:
    build:
      context: ./infrastructure/nginx
      dockerfile: Dockerfile
    container_name: lp_nginx
    ports:
      - "80:80"
    depends_on:
      - user-service
      - course-service
      - analytics-service
      - ai-tutor-service
      - feedback-service
    networks:
      - learning_network
    restart: unless-stopped

# ==================== VOLUMES ====================

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  minio_data:
  ollama_data:
  n8n_data:

# ==================== NETWORK ====================

networks:
  learning_network:
    driver: bridge